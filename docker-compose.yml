services:
  postgres:
    image: postgres:16-alpine
    container_name: transfer_postgres
    environment:
      POSTGRES_DB: transfer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transfer_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: transfer_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: transfer_backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/transfer_db
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/storage/uploads
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      APP_ENV: ${APP_ENV:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-*}
      COOKIE_SECURE: ${COOKIE_SECURE:-0}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      SESSION_IDLE_MINUTES: ${SESSION_IDLE_MINUTES:-10}
      APP_ADMIN_USER: CreaTRO
      APP_ADMIN_PASS: Micetro25+.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./storage/uploads:/app/storage/uploads

  worker:
    build:
      context: ./backend
    container_name: transfer_worker
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/transfer_db
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/storage/uploads
      RQ_QUEUE: upload_processing
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./storage/uploads:/app/storage/uploads

volumes:
  postgres_data:
