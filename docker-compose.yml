services:
  postgres:
    image: postgres:16-alpine
    container_name: transfer_postgres
    environment:
      POSTGRES_DB: transfer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transfer_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: transfer_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: transfer_backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/transfer_db
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/storage/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./storage/uploads:/app/storage/uploads

volumes:
  postgres_data:
